name: Build & deploy dashboard

on:
  schedule:
    # Three daily refreshes at ~12am, 5am, and 12pm US Eastern.
    # GitHub cron is UTC and ignores DST; these UTC hours map to EDT (baseball
    # season). In EST winter they'd land an hour earlier — fine, season's over.
    # 04:00 UTC = 12am ET · 09:00 UTC = 5am ET · 16:00 UTC = 12pm ET.
    # GitHub may delay scheduled runs under load.
    - cron: "0 4,9,16 * * *"
  workflow_dispatch: {}        # lets you run it on demand from the Actions tab
  push:
    branches: [main]           # also rebuild on every push to main

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer run supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build dashboard
        env:
          # Non-secret league config (edit SEASON each year):
          LEAGUE_ID: "11350"
          SEASON: "2026"
          # Secret ESPN auth cookies — set these in repo Settings → Secrets:
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID: ${{ secrets.SWID }}
        run: python build_dashboard.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
